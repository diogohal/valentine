# ============================================================================
# Zensical configuration for the Valentine documentation site.
# Full reference: https://zensical.org/docs/
# ============================================================================

[project]

site_name = "Valentine"
site_description = "Schema matching for pandas DataFrames — made easy."
site_author = "Delft Data"
site_url = "https://delftdata.github.io/valentine/"
copyright = """
Copyright &copy; 2026 Delft Data
"""

repo_name = "delftdata/valentine"
repo_url = "https://github.com/delftdata/valentine"

extra_css = ["assets/extra.css"]

nav = [
    { "Home" = "index.md" },
    { "Getting started" = "getting-started.md" },
    { "Matchers" = "matchers.md" },
    { "Matcher results" = "results.md" },
    { "Evaluation metrics" = "metrics.md" },
    { "Full example" = "example.md" },
    { "API reference" = "api.md" },
    { "FAQ" = "faq.md" },
    { "Changelog" = "changelog.md" },
    { "Research" = "research.md" },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]

custom_dir = "overrides"
language = "en"

features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

logo = "assets/logo.png"
favicon = "assets/favicon.png"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme = "default"
primary = "pink"
accent = "pink"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "pink"
accent = "pink"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Social links in the footer
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/delftdata/valentine"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/valentine/"
